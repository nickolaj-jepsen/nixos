# For the `--auto` merge below to actually wait for CI, the `build (<host>)`
# and `darwin` checks from fmt.yml must be marked as required status checks on
# `main` in the repo's branch protection settings. Otherwise this PR
# auto-merges regardless of whether builds pass.
name: Update flake.lock
on:
  schedule:
    - cron: "0 0 * * *" # Every night at midnight
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: update-flake
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-nix
      - uses: DeterminateSystems/update-flake-lock@834c491b2ece4de0bbd00d85214bb5e83b4da5c6 # v28
        id: update
        with:
          pr-title: "chore(flake): update flake.lock"
          pr-labels: |
            dependencies
            automated
      - name: Enable auto-merge
        if: steps.update.outputs.pull-request-number != ''
        run: gh pr merge --auto --rebase "${{ steps.update.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ github.token }}
