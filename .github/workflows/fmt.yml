name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-nix
      - name: Check formatting
        run: nix fmt -- --fail-on-change

  hosts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      list: ${{ steps.list.outputs.list }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-nix
      - id: list
        name: Enumerate nixosConfigurations
        # Exclude bootstrap-* hosts: those build installer ISOs and aren't worth
        # the matrix slot on every PR. The real hosts are all that's needed for
        # the build gate.
        run: |
          list=$(nix eval --json .#nixosConfigurations --apply builtins.attrNames \
            | jq -c '[ .[] | select(startswith("bootstrap") | not) ]')
          echo "list=$list" >> "$GITHUB_OUTPUT"
          echo "Matrix: $list"

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://attic.${{ secrets.HOMELAB_DOMAIN }}/
          attic-cache: nixos
          attic-token: ${{ secrets.ATTIC_TOKEN }}
      - name: Run nix flake check
        run: nix flake check

  eval:
    needs: hosts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.hosts.outputs.list) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-nix
      - name: Evaluate ${{ matrix.host }}
        run: nix eval --raw .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel.drvPath

  build:
    needs: [hosts, fmt, check, eval]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.hosts.outputs.list) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://attic.${{ secrets.HOMELAB_DOMAIN }}/
          attic-cache: nixos
          attic-token: ${{ secrets.ATTIC_TOKEN }}
      - name: Build ${{ matrix.host }}
        run: nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
